<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Placify</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="style-additions.css" />
  <link rel="stylesheet" href="auth.css" />
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <i data-lucide="code-2" class="text-primary"></i>
        Placify
      </div>
      
      <h2 class="card-title mb-4 text-left" style="font-size: 1.25rem;">Welcome back</h2>
      
      <!-- Email Login Panel -->
      <form id="login-email-form" class="text-left" onsubmit="event.preventDefault(); handleLogin('email');">
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required />
        </div>
        
        <div class="form-group mb-4">
          <div class="flex justify-between items-center mb-1">
            <label class="form-label mb-0">Password</label>
            <a href="#" class="text-primary" style="font-size: 0.75rem;">Forgot password?</a>
          </div>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••" required />
        </div>
        
        <button type="submit" class="btn btn-primary btn-block" style="padding: 0.75rem;">Sign In</button>
      </form>

      <div class="auth-toggle">
        Don't have an account? <a href="signup.html">Sign up</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
