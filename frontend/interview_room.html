<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interview Room - Placify</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="style-additions.css" />
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* Reset & Base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1A1A1A; --surface: #262626; --card: #2D2D2D;
      --border: #3A3A3A; --accent: #FFA116; --success: #00B8A3;
      --warning: #FFC857; --error: #FF6B6B; --txt: #FFFFFF; --txt2: #B0B0B0;
      --radius: 6px;
    }
    body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
    
    /* Layout */
    .app { display: flex; height: 100vh; overflow: hidden; justify-content: center; background: var(--bg); }
    
    /* Main Area */
    .workspace { width: 100%; max-width: 900px; display: flex; flex-direction: column; overflow: hidden; background: var(--surface); border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    
    /* Top bar */
    .topbar { height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-title { font-weight: 700; font-size: 1rem; color: var(--txt); display: flex; align-items: center; gap: 8px; }
    .topbar-title i { color: var(--accent); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .btn-end { background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.4); color: var(--error); padding: 6px 14px; border-radius: var(--radius); font-size: 0.85rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
    .btn-end:hover { background: rgba(255,107,107,0.2); }
    
    /* Chat Panel */
    .panel-chat { flex: 1; display: flex; flex-direction: column; background: var(--surface); overflow: hidden; }
    .chat-history { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
    
    .chat-msg { display: flex; flex-direction: column; gap: 6px; max-width: 85%; }
    .chat-msg.interviewer { align-self: flex-start; }
    .chat-msg.candidate { align-self: flex-end; align-items: flex-end; }
    
    .msg-author { font-size: 0.75rem; color: var(--txt2); font-weight: 600; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
    .msg-bubble { padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; line-height: 1.6; }
    .interviewer .msg-bubble { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
    .candidate .msg-bubble { background: var(--accent); color: #000; border-bottom-right-radius: 2px; }
    
    .chat-input-area { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--bg); display: flex; gap: 12px; align-items: flex-end; }
    .chat-input { flex: 1; background: var(--surface); border: 1px solid var(--border); padding: 12px 16px; border-radius: 24px; color: var(--txt); font-size: 0.95rem; resize: none; min-height: 48px; max-height: 120px; font-family: 'Inter', sans-serif; outline: none; }
    .chat-input:focus { border-color: var(--accent); }
    .btn-send { background: var(--accent); color: #000; border: none; border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: filter 0.15s; flex-shrink: 0; }
    .btn-send:hover { filter: brightness(1.1); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    /* Modal Overlay */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px; width: 500px; max-width: 90%; text-align: center; }
    .modal-content h2 { color: var(--accent); margin-bottom: 16px; font-size: 1.5rem; }
    .modal-content p { color: var(--txt2); line-height: 1.6; margin-bottom: 24px; font-size: 0.95rem; }
    .modal-actions { display: flex; gap: 12px; justify-content: center; }
    .btn-primary { background: var(--accent); color: #000; border: none; padding: 10px 24px; border-radius: var(--radius); font-weight: 600; cursor: pointer; text-decoration: none; }
  </style>
</head>
<body>
<div class="app">

  <!-- Workspace -->
  <div class="workspace">

    <!-- Top bar -->
    <div class="topbar">
      <div class="topbar-left">
        <a href="interviews.html" style="color:var(--txt2); display:flex; align-items:center; text-decoration:none;"><i data-lucide="arrow-left" style="width:20px;height:20px;margin-right:8px;"></i></a>
        <span class="topbar-title"><i data-lucide="mic"></i> Live Interview Room</span>
      </div>
      <div class="topbar-right">
        <button class="btn-end" id="btnEnd"><i data-lucide="square" style="width:14px;height:14px;"></i> End Interview</button>
      </div>
    </div>

    <!-- Chat Panel -->
    <div class="panel-chat">
      <div class="chat-history" id="chatHistory">
        <!-- Chat messages injected here -->
      </div>
      <div class="chat-input-area">
        <textarea class="chat-input" id="chatInput" placeholder="Type your response... (Press Enter to send, Shift+Enter for new line)"></textarea>
        <button class="btn-send" id="btnSend"><i data-lucide="send" style="width:20px;height:20px;"></i></button>
      </div>
    </div>

  </div>
</div>

<!-- End Interview Modal -->
<div class="modal-overlay" id="endModal">
  <div class="modal-content">
    <h2>Interview Complete!</h2>
    <p>Your session has ended. In a full version, we would now generate your feedback scorecard based on your communication.</p>
    <div class="modal-actions">
      <a href="interviews.html" class="btn-primary">Return to Dashboard</a>
    </div>
  </div>
</div>

<script>
  lucide.createIcons();

  /* ── State ── */
  let chatMessages = [];
  let topic = new URLSearchParams(window.location.search).get('topic') || 'Behavioral';

  document.addEventListener('DOMContentLoaded', () => {
    // Initial greeting
    addMessage("interviewer", `Hello! I'm your interviewer today. We'll be focusing on ${topic}. Are you ready to begin?`);
  });

  /* ── Chat Logic ── */
  const chatHistoryEl = document.getElementById('chatHistory');
  const chatInputEl = document.getElementById('chatInput');
  const btnSend = document.getElementById('btnSend');

  function addMessage(role, content) {
    chatMessages.push({ role: role === 'interviewer' ? 'assistant' : 'user', content });
    const msgEl = document.createElement('div');
    msgEl.className = `chat-msg ${role}`;
    
    const authorHtml = role === 'interviewer' 
      ? `<i data-lucide="user-check" style="width:14px;height:14px;color:var(--success);"></i> AI Interviewer` 
      : `You`;

    msgEl.innerHTML = `
      <div class="msg-author">${authorHtml}</div>
      <div class="msg-bubble">${escHtml(content)}</div>
    `;
    chatHistoryEl.appendChild(msgEl);
    lucide.createIcons();
    chatHistoryEl.scrollTop = chatHistoryEl.scrollHeight;
  }

  async function sendMessage() {
    const text = chatInputEl.value.trim();
    if (!text) return;
    
    addMessage('candidate', text);
    chatInputEl.value = '';
    chatInputEl.disabled = true;
    btnSend.disabled = true;
    
    // Show typing indicator
    const typingId = 'typing-' + Date.now();
    const typingEl = document.createElement('div');
    typingEl.id = typingId;
    typingEl.className = 'chat-msg interviewer';
    typingEl.innerHTML = `
      <div class="msg-author"><i data-lucide="user-check" style="width:14px;height:14px;color:var(--success);"></i> AI Interviewer</div>
      <div class="msg-bubble" style="opacity:0.7;"><i>Typing...</i></div>
    `;
    chatHistoryEl.appendChild(typingEl);
    lucide.createIcons();
    chatHistoryEl.scrollTop = chatHistoryEl.scrollHeight;

    try {
      const res = await fetch('/api/interviews/session/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          topic: topic,
          messages: chatMessages,
          code: '' // No code in pure chat
        })
      });
      const data = await res.json();
      document.getElementById(typingId).remove();
      if (data.success) {
        addMessage('interviewer', data.response);
      } else {
        addMessage('interviewer', "Sorry, I had a connection issue. Can you repeat that?");
      }
    } catch(e) {
      document.getElementById(typingId).remove();
      addMessage('interviewer', "Sorry, an error occurred communicating with the server.");
    } finally {
      chatInputEl.disabled = false;
      btnSend.disabled = false;
      chatInputEl.focus();
    }
  }

  btnSend.addEventListener('click', sendMessage);
  chatInputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-resize textarea
  chatInputEl.addEventListener('input', function() {
    this.style.height = '48px';
    this.style.height = (this.scrollHeight) + 'px';
  });

  /* ── End Interview ── */
  document.getElementById('btnEnd').addEventListener('click', () => {
    document.getElementById('endModal').classList.add('open');
  });

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g, '<br>');
  }
</script>
</body>
</html>
