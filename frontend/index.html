<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Placify Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="style-additions.css" />
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="layout-wrapper">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <i data-lucide="code-2" class="text-primary mr-2"></i>
        Placify
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item active">
          <i data-lucide="layout-dashboard"></i>
          <span>Dashboard</span>
        </a>
        <a href="problems.html" class="nav-item">
          <i data-lucide="code-2"></i>
          <span>Problems</span>
        </a>
        <a href="learning.html" class="nav-item">
          <i data-lucide="book-open"></i>
          <span>Learning Paths</span>
        </a>
        <a href="interviews.html" class="nav-item">
          <i data-lucide="message-square"></i>
          <span>Mock Interviews</span>
        </a>
        <a href="jobs.html" class="nav-item">
          <i data-lucide="file-search"></i>
          <span>Resume Scanner</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="settings.html" class="nav-item">
          <i data-lucide="settings"></i>
          <span>Settings</span>
        </a>
      </div>
    </aside>

    <!-- Main Content Wrapper -->
    <div class="main-content">
      
      <!-- Top Nav -->
      <header class="top-nav">
        <div class="search-bar">
          <i data-lucide="search" class="text-secondary"></i>
          <input type="text" placeholder="Search problems, articles, or users..." />
        </div>
        <div class="user-actions">
          <button class="icon-btn" onclick="handleLogout()" title="Logout">
            <i data-lucide="log-out"></i>
          </button>
          <button class="icon-btn">
            <i data-lucide="bell"></i>
          </button>
          <div class="avatar">P</div>
        </div>
      </header>

      <!-- Dashboard Content -->
      <main class="content-area">
        <div class="dashboard-grid">
          
          <!-- Top Row: Stat Cards -->
          <div class="stats-row" id="stats-row">
            <!-- Will be populated by JS -->
          </div>

          <!-- Middle Row: Chart & Progress -->
          <div class="middle-row">
            <div class="card chart-card">
              <div class="card-header">
                <h3 class="card-title">Activity Overview</h3>
              </div>
              <div class="chart-container">
                <canvas id="activityChart"></canvas>
              </div>
            </div>
            
            <div class="card progress-card">
              <h3 class="card-title mb-4">Preparation Progress</h3>
              
              <div id="progress-container">
                <!-- Progress will be populated by JS -->
              </div>

              <h3 class="card-title mb-3 mt-4">Top Skills</h3>
              <div class="badges-container" id="top-skills-container">
                <!-- Top skills will be populated by JS -->
              </div>
            </div>
          </div>

          <!-- Bottom Row: Timeline & Chat -->
          <div class="bottom-row">
            <div class="card timeline-card">
              <h3 class="card-title mb-4">Recent Activity</h3>
              <div class="timeline" id="timeline-container">
                <!-- Timeline populated by JS -->
              </div>
            </div>
            
            <div class="card chat-card">
              <div class="chat-header pb-3 border-b mb-3">
                <i data-lucide="bot" class="text-primary mr-2"></i>
                <h3 class="card-title" style="display:inline-block;">Placify AI Coach</h3>
              </div>
              <div class="chat-messages" id="chatMessages">
                <div class="chat-bubble receive">
                  <p>Hi! I'm your AI Coach. How can I help you prepare today?</p>
                </div>
              </div>
              <div class="chat-input-area mt-3">
                <input type="text" id="chatInput" placeholder="Ask a question..." />
                <button class="btn btn-primary" id="chatSendBtn">
                  <i data-lucide="send"></i>
                </button>
              </div>
            </div>
          </div>
          
        </div>
      </main>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
