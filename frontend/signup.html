<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - Placify</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="style-additions.css" />
  <link rel="stylesheet" href="auth.css" />
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card" style="max-width: 450px;">
      <div class="auth-logo">
        <i data-lucide="code-2" class="text-primary"></i>
        Placify
      </div>
      
      <h2 class="card-title mb-2 text-left" style="font-size: 1.25rem;">Create an account</h2>
      <p class="text-secondary text-left mb-4" style="font-size: 0.875rem;">Join Placify to launch your career or hire top talent.</p>
      
      <!-- Role Selection -->
      <div class="role-group" id="role-selection">
        <div class="role-card active" data-role="candidate" onclick="selectRole('candidate')">
          <i data-lucide="user"></i>
          <div class="role-title">Candidate</div>
        </div>
        <div class="role-card" data-role="employer" onclick="selectRole('employer')">
          <i data-lucide="briefcase"></i>
          <div class="role-title">Employer</div>
        </div>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="email">Email</div>
        <div class="auth-tab" data-tab="phone">Phone</div>
      </div>

      <!-- Email Signup Panel -->
      <div class="auth-panel active" id="panel-email">
        <form id="signup-email-form" class="text-left" onsubmit="event.preventDefault(); handleSignup('email');">
          <div class="form-group mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" id="signup-name-email" class="form-input" placeholder="John Doe" required />
          </div>
          <div class="form-group mb-3">
            <label class="form-label">Email address</label>
            <input type="email" id="signup-email" class="form-input" placeholder="you@example.com" required />
          </div>
          <div class="form-group mb-4">
            <label class="form-label">Password</label>
            <input type="password" id="signup-password" class="form-input" placeholder="Create a strong password" required />
          </div>
          <button type="submit" class="btn btn-primary btn-block" style="padding: 0.75rem;">Create Account</button>
        </form>
      </div>

      <!-- Phone Signup Panel -->
      <div class="auth-panel" id="panel-phone">
        <form id="signup-phone-form" class="text-left" onsubmit="event.preventDefault(); handleSignup('phone');">
          <div class="form-group mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" id="signup-name-phone" class="form-input" placeholder="John Doe" required />
          </div>
          <div class="form-group mb-4">
            <label class="form-label">Phone Number</label>
            <input type="tel" id="signup-phone" class="form-input" placeholder="+1 (555) 000-0000" required />
          </div>
          
          <button type="submit" class="btn btn-primary btn-block" style="padding: 0.75rem;" id="btn-send-otp-signup">Send OTP</button>
          
          <!-- OTP Section -->
          <div id="otp-section-signup" style="display: none; margin-top: 1.5rem;">
            <label class="form-label text-center">Enter 6-digit Code</label>
            <div class="otp-group">
              <input type="text" class="otp-input" maxlength="1" />
              <input type="text" class="otp-input" maxlength="1" />
              <input type="text" class="otp-input" maxlength="1" />
              <input type="text" class="otp-input" maxlength="1" />
              <input type="text" class="otp-input" maxlength="1" />
              <input type="text" class="otp-input" maxlength="1" />
            </div>
            <button type="button" class="btn btn-primary btn-block" style="padding: 0.75rem;" onclick="verifyOTP('signup')">Verify & Create Account</button>
          </div>
        </form>
      </div>

      <div class="divider">or sign up with</div>
      
      <button class="btn-social" onclick="handleSignup('google')">
        <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google
      </button>

      <div class="auth-toggle">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
      
      <!-- Container for Firebase reCAPTCHA -->
      <div id="recaptcha-container" style="margin-top: 1rem;"></div>
    </div>
  </div>

  <!-- Load Firebase SDK directly in firebase-auth.js or here -->
  <script type="module" src="firebase-auth.js"></script>
  <script src="script.js"></script>
  <script>
    lucide.createIcons();
    
    // Role selection
    window.selectedRole = 'candidate';
    function selectRole(role) {
      window.selectedRole = role;
      document.querySelectorAll('.role-card').forEach(card => {
        card.classList.toggle('active', card.dataset.role === role);
      });
    }

    // Tab switching logic
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
        
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      });
    });

    // Auto-focus next OTP input
    document.querySelectorAll('.otp-input').forEach((input, index, inputs) => {
      input.addEventListener('input', function() {
        if (this.value.length === 1 && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
      });
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
          inputs[index - 1].focus();
        }
      });
    });
  </script>
</body>
</html>
