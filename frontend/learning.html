<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learning Paths - Placify</title>
  <meta name="description" content="Visual learning roadmaps for DSA, Frontend, Backend and System Design."/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="style-additions.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1A1A1A; --surface: #262626; --card: #2D2D2D;
      --border: #3A3A3A; --accent: #FFA116; --success: #00B8A3;
      --warning: #FFC857; --error: #FF6B6B; --txt: #FFFFFF; --txt2: #B0B0B0;
      --radius: 8px;
    }
    body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; overflow: hidden; }
    .app { display: flex; height: 100vh; }

    /* ── Sidebar ── */
    .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-header { height: 56px; display: flex; align-items: center; gap: 8px; padding: 0 20px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 1.1rem; }
    .sidebar-header i { color: var(--accent); width: 20px; height: 20px; }
    .sidebar-nav { flex: 1; padding: 12px 8px; display: flex; flex-direction: column; gap: 2px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius); color: var(--txt2); font-size: 0.875rem; font-weight: 500; text-decoration: none; transition: all 0.15s; }
    .nav-item:hover { background: var(--card); color: var(--txt); }
    .nav-item.active { background: var(--card); color: var(--txt); border-left: 3px solid var(--accent); border-radius: 0 var(--radius) var(--radius) 0; }
    .nav-item i { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-footer { padding: 12px 8px; border-top: 1px solid var(--border); }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; }
    .topbar h1 { font-size: 1rem; font-weight: 700; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }

    /* ── Content ── */
    .content { flex: 1; overflow-y: auto; padding: 28px 32px; }

    /* ── Roadmap selector cards ── */
    .roadmap-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    .rm-card { background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
    .rm-card::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg, transparent 60%, rgba(255,255,255,0.03)); }
    .rm-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .rm-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 8px 24px rgba(255,161,22,0.2); }
    .rm-card-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
    .rm-card-icon i { width: 22px; height: 22px; }
    .rm-card-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
    .rm-card-desc { font-size: 0.75rem; color: var(--txt2); line-height: 1.5; margin-bottom: 14px; }
    .rm-progress-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
    .rm-progress-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
    .rm-progress-label { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--txt2); }

    /* ── Roadmap view ── */
    .roadmap-view { display: none; animation: fadeIn 0.3s ease; }
    .roadmap-view.visible { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Roadmap header ── */
    .rm-view-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    .rm-view-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .rm-view-icon i { width: 24px; height: 24px; }
    .rm-view-title { font-size: 1.4rem; font-weight: 700; }
    .rm-view-desc { font-size: 0.85rem; color: var(--txt2); margin-top: 2px; }

    /* ── Progress summary ── */
    .progress-summary { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px 24px; margin-bottom: 28px; display: flex; align-items: center; gap: 28px; }
    .prog-main { flex: 1; }
    .prog-bar-container { height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; margin: 8px 0; }
    .prog-bar-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.6s ease; }
    .prog-bar-label { font-size: 0.8rem; color: var(--txt2); display: flex; justify-content: space-between; }
    .prog-chips { display: flex; gap: 16px; flex-shrink: 0; }
    .prog-chip { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .prog-chip-num { font-size: 1.4rem; font-weight: 700; }
    .prog-chip-lbl { font-size: 0.7rem; color: var(--txt2); text-transform: uppercase; letter-spacing: 0.05em; }

    /* ── Sections ── */
    .rm-sections { display: flex; flex-direction: column; align-items: center; gap: 0; }
    .rm-section-wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; }
    .connector-line { width: 2px; height: 32px; background: linear-gradient(to bottom, var(--border), transparent); }
    .connector-line.dashed { background: none; border-left: 2px dashed var(--border); }

    /* ── Section header ── */
    .section-header { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 28px; font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--txt2); margin-bottom: 0; }

    /* ── Nodes grid ── */
    .nodes-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 20px 0; max-width: 900px; }
    .node-pill { position: relative; display: flex; align-items: center; gap: 8px; padding: 9px 16px; border-radius: 24px; border: 1.5px solid var(--border); background: transparent; cursor: pointer; font-size: 0.82rem; font-weight: 600; color: var(--txt2); transition: all 0.18s; user-select: none; }
    .node-pill:hover { transform: scale(1.04); z-index: 1; }
    .node-pill.done { border-color: var(--success); background: rgba(0,184,163,0.1); color: var(--txt); }
    .node-pill.done:hover { background: rgba(0,184,163,0.18); box-shadow: 0 0 12px rgba(0,184,163,0.25); }
    .node-pill.in-progress { border-color: var(--accent); background: rgba(255,161,22,0.1); color: var(--txt); }
    .node-pill.in-progress:hover { background: rgba(255,161,22,0.18); box-shadow: 0 0 12px rgba(255,161,22,0.25); }
    .node-pill.todo { border-color: #444; color: #888; }
    .node-pill.todo:hover { border-color: #666; color: var(--txt2); }
    .node-icon { width: 14px; height: 14px; flex-shrink: 0; }
    .node-icon.done { color: var(--success); }
    .node-icon.in-progress { color: var(--accent); }
    .node-icon.todo { color: #555; }
    @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(255,161,22,0.4); } 70% { box-shadow: 0 0 0 8px rgba(255,161,22,0); } 100% { box-shadow: 0 0 0 0 rgba(255,161,22,0); } }
    .node-pill.in-progress { animation: pulse-ring 2.5s infinite; }

    /* ── Node detail panel (slide-in) ── */
    .node-detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; backdrop-filter: blur(2px); }
    .node-detail-overlay.open { display: flex; align-items: center; justify-content: center; }
    .node-detail-panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; width: 480px; max-width: 95vw; padding: 28px; box-shadow: 0 24px 64px rgba(0,0,0,0.6); animation: panelIn 0.25s ease; }
    @keyframes panelIn { from { opacity: 0; transform: scale(0.95) translateY(16px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .node-detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
    .node-detail-close { background: none; border: none; color: var(--txt2); cursor: pointer; padding: 4px; border-radius: 6px; transition: all 0.15s; }
    .node-detail-close:hover { background: rgba(255,255,255,0.06); color: var(--txt); }
    .node-detail-title { font-size: 1.1rem; font-weight: 700; }
    .node-detail-status { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; margin-bottom: 14px; }
    .node-detail-desc { font-size: 0.875rem; color: #C0C0C0; line-height: 1.75; margin-bottom: 20px; }
    .node-detail-resources { margin-bottom: 20px; }
    .node-detail-resources h4 { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--txt2); margin-bottom: 8px; }
    .resource-link { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.82rem; color: var(--accent); margin-bottom: 6px; cursor: pointer; transition: border-color 0.15s; }
    .resource-link:hover { border-color: var(--accent); }
    .resource-link i { width: 14px; height: 14px; }
    .no-resources { font-size: 0.82rem; color: var(--txt2); font-style: italic; }
    .status-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .status-btn { flex: 1; padding: 9px 12px; border-radius: var(--radius); font-size: 0.82rem; font-weight: 600; cursor: pointer; border: 1.5px solid transparent; transition: all 0.15s; text-align: center; }
    .status-btn.done-btn { background: rgba(0,184,163,0.12); border-color: rgba(0,184,163,0.4); color: var(--success); }
    .status-btn.done-btn:hover { background: rgba(0,184,163,0.22); }
    .status-btn.progress-btn { background: rgba(255,161,22,0.12); border-color: rgba(255,161,22,0.4); color: var(--accent); }
    .status-btn.progress-btn:hover { background: rgba(255,161,22,0.22); }
    .status-btn.todo-btn { background: rgba(255,255,255,0.04); border-color: #444; color: var(--txt2); }
    .status-btn.todo-btn:hover { background: rgba(255,255,255,0.08); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  </style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header"><i data-lucide="code-2"></i> Placify</div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
      <a href="problems.html" class="nav-item"><i data-lucide="code-2"></i><span>Problems</span></a>
      <a href="learning.html" class="nav-item active"><i data-lucide="book-open"></i><span>Learning Paths</span></a>
      <a href="interviews.html" class="nav-item"><i data-lucide="message-square"></i><span>Mock Interviews</span></a>
      <a href="jobs.html" class="nav-item"><i data-lucide="file-search"></i><span>Resume Scanner</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="settings.html" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <h1>&#128218; Learning Paths</h1>
      <div class="topbar-right">
        <a href="login.html" style="width:32px;height:32px;border-radius:50%;background:var(--accent);color:#000;display:flex;align-items:center;justify-content:center;font-weight:700;text-decoration:none;font-size:0.85rem;">P</a>
      </div>
    </div>

    <div class="content" id="mainContent">
      <!-- Roadmap selector -->
      <div class="roadmap-selector" id="roadmapSelector">
        <div style="grid-column:1/-1;text-align:center;color:var(--txt2);padding:40px;">Loading roadmaps...</div>
      </div>

      <!-- Roadmap view -->
      <div class="roadmap-view" id="roadmapView"></div>
    </div>
  </div>
</div>

<!-- Node detail modal -->
<div class="node-detail-overlay" id="nodeOverlay">
  <div class="node-detail-panel" id="nodePanel">
    <div class="node-detail-header">
      <div>
        <div class="node-detail-title" id="nodeTitle">Node</div>
        <div class="node-detail-status" id="nodeStatus"></div>
      </div>
      <button class="node-detail-close" onclick="closeNodePanel()"><i data-lucide="x" style="width:20px;height:20px;"></i></button>
    </div>
    <p class="node-detail-desc" id="nodeDesc"></p>
    <div class="node-detail-resources">
      <h4>Resources</h4>
      <div id="nodeResources"></div>
    </div>
    <div class="status-actions">
      <button class="status-btn done-btn" onclick="updateNodeStatus('done')">&#10003; Mark as Done</button>
      <button class="status-btn progress-btn" onclick="updateNodeStatus('in-progress')">&#9654; In Progress</button>
      <button class="status-btn todo-btn" onclick="updateNodeStatus('todo')">&#9675; Reset to Todo</button>
    </div>
  </div>
</div>

<script>
  lucide.createIcons();

  let allRoadmaps = [], activeRoadmap = null, activeRoadmapId = null;
  let selectedNodeId = null, selectedRoadmapId = null;

  /* ── Load roadmap list ── */
  async function loadRoadmaps() {
    try {
      const res = await fetch('/api/learning/roadmaps');
      const data = await res.json();
      if (data.success) {
        allRoadmaps = data.roadmaps;
        renderSelector();
        // Auto-open first
        if (allRoadmaps.length) selectRoadmap(allRoadmaps[0].id);
      }
    } catch(e) { document.getElementById('roadmapSelector').innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--error);padding:40px;">Failed to load. Is the server running?</div>'; }
  }

  function renderSelector() {
    const sel = document.getElementById('roadmapSelector');
    sel.innerHTML = allRoadmaps.map(rm => `
      <div class="rm-card${activeRoadmapId===rm.id?' active':''}" onclick="selectRoadmap('${rm.id}')" id="rmCard_${rm.id}">
        <div class="rm-card-icon" style="background:${rm.color}22;">
          <i data-lucide="${rm.icon}" style="color:${rm.color};"></i>
        </div>
        <div class="rm-card-title">${rm.title}</div>
        <div class="rm-card-desc">${rm.description}</div>
        <div class="rm-progress-bar"><div class="rm-progress-fill" style="width:${rm.percent}%;background:${rm.color};"></div></div>
        <div class="rm-progress-label"><span>${rm.done_nodes} / ${rm.total_nodes} topics</span><span style="color:${rm.color};font-weight:700;">${rm.percent}%</span></div>
      </div>
    `).join('');
    lucide.createIcons();
  }

  async function selectRoadmap(id) {
    activeRoadmapId = id;
    renderSelector();
    try {
      const res = await fetch(`/api/learning/roadmaps/${id}`);
      const data = await res.json();
      if (data.success) {
        activeRoadmap = data.roadmap;
        renderRoadmapView(data.roadmap, data.stats);
      }
    } catch(e) {}
  }

  function renderRoadmapView(rm, stats) {
    const view = document.getElementById('roadmapView');
    const rmMeta = allRoadmaps.find(r => r.id === rm.id) || {};
    const pct = stats.total > 0 ? Math.round((stats.done/stats.total)*100) : 0;

    let html = `
      <div class="rm-view-header">
        <div class="rm-view-icon" style="background:${rmMeta.color||'#FFA116'}22;">
          <i data-lucide="${rm.icon||'book'}" style="color:${rmMeta.color||'#FFA116'};"></i>
        </div>
        <div>
          <div class="rm-view-title">${rm.title}</div>
          <div class="rm-view-desc">${rm.description}</div>
        </div>
      </div>
      <div class="progress-summary">
        <div class="prog-main">
          <div style="font-size:0.85rem;font-weight:600;margin-bottom:4px;">Overall Progress</div>
          <div class="prog-bar-container"><div class="prog-bar-fill" style="width:${pct}%;background:${rmMeta.color||'#FFA116'};"></div></div>
          <div class="prog-bar-label"><span>${pct}% Complete</span><span>${stats.done} of ${stats.total} topics</span></div>
        </div>
        <div class="prog-chips">
          <div class="prog-chip"><span class="prog-chip-num" style="color:var(--success);">${stats.done}</span><span class="prog-chip-lbl">Done</span></div>
          <div class="prog-chip"><span class="prog-chip-num" style="color:var(--accent);">${stats.in_progress}</span><span class="prog-chip-lbl">In Progress</span></div>
          <div class="prog-chip"><span class="prog-chip-num" style="color:var(--txt2);">${stats.todo}</span><span class="prog-chip-lbl">Todo</span></div>
        </div>
      </div>
      <div class="rm-sections" id="rmSections">
    `;

    (rm.sections||[]).forEach((section, si) => {
      if (si > 0) html += '<div class="connector-line dashed"></div>';
      html += `<div class="rm-section-wrapper">
        <div class="connector-line" style="height:20px;"></div>
        <div class="section-header">${section.title}</div>
        <div class="nodes-grid">
          ${(section.nodes||[]).map(node => nodeHtml(node, rm.id)).join('')}
        </div>
      </div>`;
    });

    html += '</div>';
    view.innerHTML = html;
    view.classList.add('visible');
    lucide.createIcons();
  }

  function nodeHtml(node, rmId) {
    const icons = { done: 'check-circle-2', 'in-progress': 'loader-2', todo: 'circle' };
    return `<div class="node-pill ${node.status}" onclick="openNodePanel('${rmId}','${node.id}')" id="node_${node.id}" title="${node.title}">
      <i data-lucide="${icons[node.status]||'circle'}" class="node-icon ${node.status}"></i>
      ${escHtml(node.title)}
    </div>`;
  }

  /* ── Node detail panel ── */
  function openNodePanel(rmId, nodeId) {
    if (!activeRoadmap) return;
    selectedRoadmapId = rmId;
    selectedNodeId = nodeId;
    let node = null;
    for (const s of (activeRoadmap.sections||[])) {
      node = s.nodes?.find(n => n.id === nodeId);
      if (node) break;
    }
    if (!node) return;

    document.getElementById('nodeTitle').textContent = node.title;
    document.getElementById('nodeDesc').textContent = node.description || 'No description available.';

    const statusColors = { done: { bg:'rgba(0,184,163,0.12)', color:'var(--success)', label:'&#10003; Done' }, 'in-progress': { bg:'rgba(255,161,22,0.12)', color:'var(--accent)', label:'&#9654; In Progress' }, todo: { bg:'rgba(255,255,255,0.06)', color:'var(--txt2)', label:'&#9675; Not Started' } };
    const sc = statusColors[node.status] || statusColors.todo;
    document.getElementById('nodeStatus').innerHTML = sc.label;
    document.getElementById('nodeStatus').style.cssText = `background:${sc.bg};color:${sc.color};`;

    const resources = node.resources || [];
    document.getElementById('nodeResources').innerHTML = resources.length
      ? resources.map(r => `<div class="resource-link"><i data-lucide="external-link"></i>${escHtml(r)}</div>`).join('')
      : '<p class="no-resources">No resources added yet.</p>';

    document.getElementById('nodeOverlay').classList.add('open');
    lucide.createIcons();
  }

  function closeNodePanel() {
    document.getElementById('nodeOverlay').classList.remove('open');
    selectedNodeId = null; selectedRoadmapId = null;
  }

  document.getElementById('nodeOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('nodeOverlay')) closeNodePanel();
  });

  async function updateNodeStatus(status) {
    if (!selectedRoadmapId || !selectedNodeId) return;
    try {
      await fetch(`/api/learning/roadmaps/${selectedRoadmapId}/nodes/${selectedNodeId}/progress`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      closeNodePanel();
      await selectRoadmap(selectedRoadmapId);
      // Reload selector counts
      const res = await fetch('/api/learning/roadmaps');
      const data = await res.json();
      if (data.success) { allRoadmaps = data.roadmaps; renderSelector(); }
    } catch(e) { console.error(e); }
  }

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadRoadmaps();
</script>
</body>
</html>
