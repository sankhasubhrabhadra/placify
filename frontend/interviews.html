<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mock Interviews - Placify</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="style-additions.css" />
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="layout-wrapper">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <i data-lucide="code-2" class="text-primary mr-2"></i>
        Placify
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">
          <i data-lucide="layout-dashboard"></i>
          <span>Dashboard</span>
        </a>
        <a href="problems.html" class="nav-item">
          <i data-lucide="code-2"></i>
          <span>Problems</span>
        </a>
        <a href="learning.html" class="nav-item">
          <i data-lucide="book-open"></i>
          <span>Learning Paths</span>
        </a>
        <a href="interviews.html" class="nav-item active">
          <i data-lucide="message-square"></i>
          <span>Mock Interviews</span>
        </a>
        <a href="jobs.html" class="nav-item">
          <i data-lucide="file-search"></i>
          <span>Resume Scanner</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="settings.html" class="nav-item">
          <i data-lucide="settings"></i>
          <span>Settings</span>
        </a>
      </div>
    </aside>

    <!-- Main Content Wrapper -->
    <div class="main-content">
      
      <!-- Top Nav -->
      <header class="top-nav">
        <div class="search-bar">
          <i data-lucide="search" class="text-secondary"></i>
          <input type="text" placeholder="Search problems, articles, or users..." />
        </div>
        <div class="user-actions">
          <button class="icon-btn">
            <i data-lucide="bell"></i>
          </button>
          <a href="login.html" class="avatar" style="text-decoration: none;">P</a>
        </div>
      </header>

      <!-- Content -->
      <main class="content-area">
        <div class="dashboard-grid">
          <div class="flex justify-between items-center mb-4">
            <h2 class="card-title" style="font-size: 1.5rem;">Mock Interviews</h2>
            <button class="btn btn-primary">Schedule Interview</button>
          </div>

          <div class="grid grid-cols-2 gap-6">
            <!-- Upcoming -->
            <div class="card">
              <div class="flex items-center gap-2 mb-4 pb-3 border-b">
                <i data-lucide="calendar" class="text-primary"></i>
                <h3 class="card-title">Upcoming</h3>
              </div>
              
              <div class="flex-col gap-4" id="upcoming-container">
                <!-- Populated by JS -->
              </div>
            </div>

            <!-- Past Feedback -->
            <div class="card">
              <div class="flex items-center gap-2 mb-4 pb-3 border-b">
                <i data-lucide="history" class="text-secondary"></i>
                <h3 class="card-title">Past Interviews</h3>
              </div>
              
              <div class="flex-col gap-4" id="past-container">
                <!-- Populated by JS -->
              </div>
            </div>

          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
